name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Environment secrets only work when this name matches Settings → Environments
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup environment from secrets
        run: |
          cp .env.production .env
          sed -i "s|VITE_APPHUB_BACKEND_URL=.*|VITE_APPHUB_BACKEND_URL=${{ secrets.VITE_APPHUB_BACKEND_URL }}|g" .env
          sed -i "s|VITE_APPHUB_CORE_URL=.*|VITE_APPHUB_CORE_URL=${{ secrets.VITE_APPHUB_CORE_URL }}|g" .env
          sed -i "s|VITE_APPHUB_PARENT_ORIGINS=.*|VITE_APPHUB_PARENT_ORIGINS=${{ secrets.VITE_APPHUB_PARENT_ORIGINS }}|g" .env
          if ! grep -qE '^VITE_APPHUB_BACKEND_URL=.+' .env; then
            echo "::error::VITE_APPHUB_BACKEND_URL is empty. Add it under Repository secrets OR Environment secrets for github-pages."
            exit 1
          fi
          if ! grep -qE '^VITE_APPHUB_CORE_URL=.+' .env; then
            echo "::error::VITE_APPHUB_CORE_URL is empty."
            exit 1
          fi
          if ! grep -qE '^VITE_APPHUB_PARENT_ORIGINS=.+' .env; then
            echo "::error::VITE_APPHUB_PARENT_ORIGINS is empty."
            exit 1
          fi

      - name: Install and build
        run: |
          npm install
          npm run build
          touch public/.nojekyll
          if grep -q '/src/main.js' public/index.html; then
            echo "Build did not bundle entry — public/index.html still points at /src/main.js"
            exit 1
          fi

      - name: Deploy public/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
