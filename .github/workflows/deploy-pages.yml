name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup environment from secrets
        run: |
          cp .env.production .env
          sed -i "s|VITE_APPHUB_BACKEND_URL=.*|VITE_APPHUB_BACKEND_URL=${{ secrets.VITE_APPHUB_BACKEND_URL }}|g" .env
          sed -i "s|VITE_APPHUB_CORE_URL=.*|VITE_APPHUB_CORE_URL=${{ secrets.VITE_APPHUB_CORE_URL }}|g" .env
          sed -i "s|VITE_APPHUB_PARENT_ORIGINS=.*|VITE_APPHUB_PARENT_ORIGINS=${{ secrets.VITE_APPHUB_PARENT_ORIGINS }}|g" .env

      - name: Install and build
        run: |
          npm install
          npm run build
          touch dist/.nojekyll
          if grep -q '/src/main.js' dist/index.html; then
            echo "Build did not bundle entry — dist/index.html still points at /src/main.js"
            exit 1
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
