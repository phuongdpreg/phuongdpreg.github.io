name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Secrets: Settings → Environments → github-pages → Environment secrets
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Inject secrets into .env.production
        run: |
          sed -i "s|VITE_APPHUB_BACKEND_URL=.*|VITE_APPHUB_BACKEND_URL=${{ secrets.VITE_APPHUB_BACKEND_URL }}|g" .env.production
          sed -i "s|VITE_APPHUB_CORE_URL=.*|VITE_APPHUB_CORE_URL=${{ secrets.VITE_APPHUB_CORE_URL }}|g" .env.production
          sed -i "s|VITE_APPHUB_PARENT_ORIGINS=.*|VITE_APPHUB_PARENT_ORIGINS=${{ secrets.VITE_APPHUB_PARENT_ORIGINS }}|g" .env.production
          if ! grep -qE '^VITE_APPHUB_BACKEND_URL=.+' .env.production; then
            echo "::error::VITE_APPHUB_BACKEND_URL is empty. Add Environment secret: Settings → Environments → github-pages → Environment secrets (name must match exactly)."
            exit 1
          fi
          if ! grep -qE '^VITE_APPHUB_CORE_URL=.+' .env.production; then
            echo "::error::VITE_APPHUB_CORE_URL is empty. Add to Environment github-pages."
            exit 1
          fi
          if ! grep -qE '^VITE_APPHUB_PARENT_ORIGINS=.+' .env.production; then
            echo "::error::VITE_APPHUB_PARENT_ORIGINS is empty. Add to Environment github-pages."
            exit 1
          fi

      - name: Install and build
        env:
          VITE_APPHUB_BACKEND_URL: ${{ secrets.VITE_APPHUB_BACKEND_URL }}
          VITE_APPHUB_CORE_URL: ${{ secrets.VITE_APPHUB_CORE_URL }}
          VITE_APPHUB_PARENT_ORIGINS: ${{ secrets.VITE_APPHUB_PARENT_ORIGINS }}
        run: |
          npm install
          npm run build
          touch public/.nojekyll
          if grep -q '/src/main.js' public/index.html; then
            echo "Build did not bundle entry — public/index.html still points at /src/main.js"
            exit 1
          fi
          BACKEND_URL=$(grep '^VITE_APPHUB_BACKEND_URL=' .env.production | cut -d= -f2-)
          JS_FILE=$(ls public/assets/index-*.js | head -1)
          if ! grep -qF "$BACKEND_URL" "$JS_FILE"; then
            echo "::error::VITE_APPHUB_BACKEND_URL was not embedded in the build output."
            exit 1
          fi

      - name: Deploy public/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
